name: Compile LaTeX to PDF

# Trigger on pushes to main OR dev
on:
  push:
    branches: [ "main", "dev" ]

# CRITICAL: Grant permission to create the release
permissions:
  contents: write

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository
      - name: Set up Git repository
        uses: actions/checkout@v4

      # Step 2: Compile the LaTeX document (This creates main.pdf)
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      # Step 3: Rename the PDF to your preferred title
      - name: Rename PDF
        run: mv main.pdf Physik_ZF.pdf

      # Step 4: Upload the temporary artifact (Runs on both main and dev)
      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdf
          path: Physik_ZF.pdf

      # Step 5: Generate a dynamic tag based on the date (ONLY runs on main)
      - name: Generate Tag Name
        if: github.ref == 'refs/heads/main'
        run: echo "TAG_NAME=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      # Step 6: Create official Release (ONLY runs on main)
      - name: Create GitHub Release and Upload PDF
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          files: Physik_ZF.pdf
          generate_release_notes: true
