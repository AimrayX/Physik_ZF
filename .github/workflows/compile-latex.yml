name: Compile LaTeX to PDF

# Trigger on pushes to main OR dev OR when pushing a version tag
on:
  push:
    branches: [ "main", "dev" ]
    tags:
      - 'v*'

# CRITICAL: Grant permission to create the release
permissions:
  contents: write

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository
      - name: Set up Git repository
        uses: actions/checkout@v4

      # Step 2: Compile the LaTeX document (This creates main.pdf)
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      # Step 3: Rename the PDF to your preferred title
      - name: Rename PDF
        run: mv main.pdf Physik_ZF.pdf

      # Step 4: Upload the temporary artifact (Runs on main, dev, and tags)
      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdf
          path: Physik_ZF.pdf

      # Step 5: Create official Release (ONLY runs when you push a tag)
      - name: Create GitHub Release and Upload PDF
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: Physik_ZF.pdf
          generate_release_notes: true
